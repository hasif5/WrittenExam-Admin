# File: nginx.conf
# nginx server block for the Admin Panel SPA: serve the static bundle, fall back
# to index.html for client-side routes, and cache hashed assets aggressively.
# Author: Hasif Ahmed <xmart@live.com> (www.hasif.info)
# Created: 2026-06-30

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets for faster first paint.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable; cache them for a year.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the entry HTML so new deploys are picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Client-side routing: unknown paths resolve to the SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
